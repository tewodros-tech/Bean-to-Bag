<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
  <title>Bean to Bag | About Us - Our Story</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800;900&family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  
  <!-- GSAP for Scroll Animations -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: #0A0A0A;
      color: #FFFFFF;
      overflow-x: hidden;
    }

    h1, h2, h3, .logo {
      font-family: 'Playfair Display', serif;
    }

    /* Scroll Progress Bar */
    .scroll-progress {
      position: fixed;
      top: 0;
      left: 0;
      width: 0%;
      height: 3px;
      background: linear-gradient(90deg, #C68B5E, #E8A87C, #FFD4A8);
      z-index: 1001;
      transition: width 0.1s;
    }

    /* Custom Cursor - hides on mobile */
    .cursor {
      width: 20px;
      height: 20px;
      background: #C68B5E;
      border-radius: 50%;
      position: fixed;
      pointer-events: none;
      z-index: 9999;
      box-shadow: 0 0 15px #C68B5E;
    }

    @media (max-width: 768px) {
      .cursor {
        display: none;
      }
    }

    /* Navigation - Mobile First */
    nav {
      position: fixed;
      top: 15px;
      left: 5%;
      right: 5%;
      width: 90%;
      background: rgba(10, 10, 10, 0.9);
      backdrop-filter: blur(20px);
      border-radius: 50px;
      z-index: 1000;
      padding: 0.7rem 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border: 1px solid rgba(198, 139, 94, 0.3);
      transition: all 0.3s;
    }
    nav.scrolled {
      top: 0;
      left: 0;
      right: 0;
      width: 100%;
      border-radius: 0;
      background: rgba(10, 10, 10, 0.98);
    }
    .logo {
      font-size: 1.3rem;
      font-weight: 800;
      background: linear-gradient(135deg, #FFFFFF, #C68B5E, #E8A87C);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .menu-icon {
      display: block;
      font-size: 1.5rem;
      cursor: pointer;
      background: none;
      border: none;
      color: white;
    }
    .nav-links {
      display: none;
      position: absolute;
      top: 60px;
      left: 0;
      width: 100%;
      background: rgba(10, 10, 10, 0.98);
      backdrop-filter: blur(20px);
      flex-direction: column;
      padding: 1rem;
      text-align: center;
      gap: 0.8rem;
      border-radius: 0 0 20px 20px;
    }
    .nav-links.active {
      display: flex;
    }
    .nav-links a {
      text-decoration: none;
      color: white;
      font-weight: 500;
      padding: 0.5rem;
      transition: 0.3s;
      font-size: 0.9rem;
    }
    .nav-links a:hover, .nav-links a.active {
      color: #C68B5E;
    }

    /* Hero Section - Mobile Optimized */
    .hero-about {
      min-height: 60vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 6rem 1.5rem 3rem;
      background: linear-gradient(135deg, rgba(0,0,0,0.6), rgba(44,24,16,0.7)), url('coffee1.JPG');
      background-size: cover;
      background-position: center;
      background-attachment: scroll;
    }
    .hero-about h1 {
      font-size: 2.5rem;
      margin-bottom: 1rem;
      animation: fadeInUp 0.8s ease;
    }
    .hero-about p {
      font-size: 1rem;
      max-width: 600px;
      margin: 0 auto;
      animation: fadeInUp 0.8s 0.2s backwards;
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Section Styles */
    .section {
      padding: 3rem 1.5rem;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
    }
