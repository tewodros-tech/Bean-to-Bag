<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bean to Bag | Specialty Coffee</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0c0604;
      --bg-raised: #140b08;
      --gold: #c9915c;
      --gold-light: #d4a574;
      --cream: #f5f0eb;
      --muted: #a89a8c;
      --border: rgba(255,255,255,0.08);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: var(--bg);
      color: var(--cream);
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* Announcement bar */
    .announce {
      background: rgba(201,145,92,0.06);
      border-bottom: 1px solid var(--border);
      text-align: center;
      padding: 10px 16px;
      font-size: 0.68rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 700;
    }

    /* Nav */
    nav {
      position: sticky;
      top: 0;
      z-index: 50;
      background: rgba(12,6,4,0.72);
      backdrop-filter: blur(16px) saturate(1.2);
      border-bottom: 1px solid var(--border);
    }
    .nav-inner {
      max-width: 1280px;
      margin: 0 auto;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
      color: var(--cream);
    }
    .logo-icon {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--gold), var(--gold-light));
      display: grid;
      place-items: center;
      flex: 0 0 auto;
      box-shadow: 0 8px 24px rgba(201,145,92,0.25);
    }
    .logo-icon svg { width: 18px; height: 18px; color: #1a0f0a; }
    .logo-text strong {
      display: block;
      font-family: 'Playfair Display', serif;
      font-size: 1.05rem;
      line-height: 1;
      font-weight: 700;
      letter-spacing: 0.2px;
    }
    .logo-text small {
      display: block;
      font-size: 0.58rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 2px;
      font-weight: 600;
    }
    .nav-links {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .nav-links a {
      text-decoration: none;
      color: var(--muted);
      font-size: 0.86rem;
      font-weight: 600;
      padding: 8px 16px;
      border-radius: 999px;
      transition: 0.2s ease;
    }
    .nav-links a:hover,
    .nav-links a.active {
      color: var(--cream);
      background: rgba(255,255,255,0.06);
    }
    .nav-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .icon-btn {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--cream);
      display: grid;
      place-items: center;
      cursor: pointer;
      transition: 0.2s;
    }
    .icon-btn:hover { background: rgba(255,255,255,0.05); }
    .btn-primary {
      background: linear-gradient(135deg, var(--gold), var(--gold-light));
      color: #1a0f0a;
      border: none;
      padding: 10px 20px;
      border-radius: 999px;
      font-weight: 800;
      font-size: 0.84rem;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      box-shadow: 0 10px 28px rgba(201,145,92,0.22);
      transition: transform 0.2s;
    }
    .btn-primary:hover { transform: translateY(-1px); }

    /* Hero */
    .hero {
      max-width: 1280px;
      margin: 0 auto;
      padding: 90px 24px 70px;
      position: relative;
    }
    .hero h1 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: clamp(3.2rem, 8.2vw, 7.2rem);
      line-height: 1.05;
      font-weight: 500;
      letter-spacing: -0.02em;
    }
    .hero h1 .line1 {
      color: var(--cream);
      display: block;
    }
    .hero h1 .line2 {
      color: var(--gold);
      font-style: italic;
      display: block;
      position: relative;
      width: fit-content;
    }
    .hero h1 .line2::after {
      content: '';
      position: absolute;
      left: 0;
      bottom: 0.02em;
      width: 100%;
      height: 0.035em;
      background: linear-gradient(90deg, var(--gold), rgba(201,145,92,0.25));
      border-radius: 2px;
    }
    .hero > p {
      margin-top: 28px;
      max-width: 580px;
      color: var(--muted);
      font-size: 1.12rem;
      line-height: 1.75;
      font-weight: 400;
    }
    .hero > p .highlight {
      color: var(--gold);
      font-weight: 500;
    }
    .hero-actions {
      margin-top: 38px;
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
    }
    .btn-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 14px 26px;
      border-radius: 999px;
      font-weight: 700;
      font-size: 0.95rem;
      text-decoration: none;
      transition: transform 0.2s, box-shadow 0.2s;
      border: none;
      cursor: pointer;
      white-space: nowrap;
    }
    .btn-pill:hover { transform: translateY(-2px); }
    .btn-gold {
      background: linear-gradient(135deg, var(--gold), var(--gold-light));
      color: #1a0f0a;
      box-shadow: 0 14px 36px rgba(201,145,92,0.22);
    }
    .btn-dark {
      background: rgba(255,255,255,0.04);
      color: var(--cream);
      border: 1px solid rgba(255,255,255,0.12);
      backdrop-filter: blur(10px);
    }
    .btn-dark:hover { background: rgba(255,255,255,0.07); }

    .scroll-indicator {
      margin-top: 70px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      color: var(--muted);
      font-size: 0.68rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      font-weight: 700;
    }
    .mouse {
      width: 20px;
      height: 32px;
      border: 2px solid rgba(255,255,255,0.18);
      border-radius: 12px;
      position: relative;
    }
    .mouse::after {
      content: '';
      position: absolute;
      top: 7px;
      left: 50%;
      transform: translateX(-50%);
      width: 3px;
      height: 5px;
      background: var(--gold);
      border-radius: 2px;
      animation: scrollWheel 2.2s ease-in-out infinite;
    }
    @keyframes scrollWheel {
      0%, 100% { opacity: 1; top: 7px; }
      50% { opacity: 0.25; top: 14px; }
    }

    /* Showcase */
    .showcase {
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 24px 90px;
    }
    .showcase-frame {
      width: 100%;
      height: 72vh;
      min-height: 420px;
      max-height: 780px;
      border-radius: 32px;
      overflow: hidden;
      position: relative;
      border: 1px solid var(--border);
      background: #0f0806;
    }
    .showcase-frame img,
    .showcase-frame video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      filter: brightness(0.92) saturate(1.05);
    }
    .steam {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 28% 78%, rgba(255,255,255,0.18) 0%, transparent 45%),
        radial-gradient(circle at 72% 68%, rgba(255,255,255,0.12) 0%, transparent 40%);
      mix-blend-mode: screen;
      pointer-events: none;
      animation: steamMove 7s ease-in-out infinite alternate;
    }
    @keyframes steamMove {
      from { transform: translateY(0) scale(1); opacity: 0.9; }
      to { transform: translateY(-24px) scale(1.06); opacity: 0.35; }
    }

    /* Mobile */
    .menu-toggle {
      display: none;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      color: var(--cream);
      padding: 8px 10px;
      border-radius: 10px;
      font-weight: 700;
      cursor: pointer;
    }
    @media (max-width: 860px) {
      .nav-links { display: none; }
      .menu-toggle { display: block; }
      .hero { padding: 60px 20px 50px; }
      .hero h1 { font-size: clamp(2.8rem, 10vw, 4.2rem); }
      .showcase-frame { height: 46vh; border-radius: 22px; }
      .btn-pill { padding: 12px 20px; font-size: 0.9rem; }
    }
  </style>
</head>
<body>

  <div class="announce">Premium Ethiopian Specialty Coffee ✦</div>

  <nav>
    <div class="nav-inner">
      <a href="#" class="logo">
        <div class="logo-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 8h1a4 4 0 0 1 0 8h-1"/>
            <path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/>
            <line x1="6" y1="1" x2="6" y2="4"/>
            <line x1="10" y1="1" x2="10" y2="4"/>
            <line x1="14" y1="1" x2="14" y2="4"/>
          </svg>
        </div>
        <div class="logo-text">
          <strong>Bean to Bag</strong>
          <small>Specialty Coffee</small>
        </div>
      </a>

      <div class="nav-links">
        <a href="#" class="active">Home</a>
        <a href="#">About</a>
        <a href="#">Products</a>
        <a href="#">Coffee Origin</a>
        <a href="#">Contact</a>
      </div>

      <div class="nav-right">
        <button class="icon-btn" aria-label="Search">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/>
            <path d="m21 21-4.35-4.35"/>
          </svg>
        </button>
        <a href="#" class="btn-primary">Order Now</a>
        <button class="menu-toggle" aria-label="Menu">Menu</button>
      </div>
    </div>
  </nav>

  <section class="hero">
    <h1>
      <span class="line1">From Bean</span>
      <span class="line2">to Bag</span>
    </h1>
    <p>
      Carefully sourced Ethiopian Arabica coffee roasted to a balanced <span class="highlight">medium-dark profile</span> for a rich and smooth cup.
    </p>

    <div class="hero-actions">
      <a href="#" class="btn-pill btn-gold">
        Explore Coffee
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M5 12h14"/>
          <path d="m12 5 7 7-7 7"/>
        </svg>
      </a>
      <button class="btn-pill btn-dark">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" style="opacity:.9">
          <polygon points="5 3 19 12 5 21 5 3"/>
        </svg>
        Watch Story
      </button>
    </div>

    <div class="scroll-indicator">
      Scroll to explore
      <div class="mouse"></div>
    </div>
  </section>

  <section class="showcase">
    <div class="showcase-frame">
      <img
        src="https://images.unsplash.com/photo-1514432324607-a09d9b4aefdd?q=80&w=2574&auto=format&fit=crop"
        alt="Freshly roasted Ethiopian coffee beans with steam"
        loading="lazy"
      />
      <div class="steam"></div>
    </div>
  </section>

</body>
</html>
